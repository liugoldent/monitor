<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HLS Custom Playlist</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111;
      }

      video {
        width: min(960px, 92vw);
        max-height: 80vh;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div>
      <button id="playBtn" disabled>Play selected clips</button>
    </div>
    <video id="video" controls playsinline muted></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>
    <script>
      const sourceUrl =
        "https://media-server.d1yj8.com/Resource/Video/22ef63ad7438ebc5/master.m3u8?package_id=1&bundle_id=xingba.web.online";
      const targets = [2, 100, 200];

      const playBtn = document.getElementById("playBtn");
      const video = document.getElementById("video");
      video.muted = true;
      video.defaultMuted = true;
      let player = null;
      let customBlobUrl = null;
      let customReady = false;

      function setupHlsAndLoad(url, isSourceManifest = false) {
        if (player) {
          player.destroy();
        }

        player = new Hls();
        player.attachMedia(video);

        player.on(Hls.Events.MEDIA_ATTACHED, () => {
          player.loadSource(url);
        });

        player.on(Hls.Events.LEVEL_LOADED, (_event, data) => {
          if (!isSourceManifest || customReady) {
            return;
          }

          const details = data.details;
          console.log("LEVEL_LOADED from source manifest", details);
          const playlist = buildCustomPlaylist(details, targets);

          if (customBlobUrl) {
            URL.revokeObjectURL(customBlobUrl);
          }
          customBlobUrl = URL.createObjectURL(
            new Blob([playlist], { type: "application/vnd.apple.mpegurl" }),
          );
          customReady = true;
          playBtn.disabled = false;
          console.log("Custom m3u8 ready:", customBlobUrl);
        });

        player.on(Hls.Events.ERROR, (_event, data) => {
          console.error("HLS.js error:", data);
        });

        player.on(Hls.Events.MANIFEST_PARSED, () => {
          video
            .play()
            .then(() => console.log("Playing custom playlist"))
            .catch((err) => console.warn("play() blocked:", err));
        });
      }

      window.addEventListener("beforeunload", () => {
        if (customBlobUrl) {
          URL.revokeObjectURL(customBlobUrl);
        }
        if (player) {
          player.destroy();
        }
      });

      playBtn.addEventListener("click", () => {
        if (!customReady || !customBlobUrl) {
          return;
        }
        setupHlsAndLoad(customBlobUrl, false);
      });

      video.addEventListener("error", () => {
        const err = video.error;
        console.error("HTMLVideoElement error:", err);
      });

      if (Hls.isSupported()) {
        setupHlsAndLoad(sourceUrl, true);
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = sourceUrl;
      } else {
        console.error("This browser does not support HLS playback.");
      }

      function buildCustomPlaylist(details, indices) {
        const fragments = details.fragments || [];
        const selected = indices.map((i) => fragments[i]).filter(Boolean);
        if (!selected.length) {
          throw new Error("No valid target fragments.");
        }
        console.log(
          "Selected segment URLs:",
          selected.map((frag, idx) => ({
            targetIndex: indices[idx],
            url: frag.url,
            startSec: Number((frag.start || 0).toFixed(3)),
            endSec: Number(((frag.start || 0) + frag.duration).toFixed(3)),
            startText: formatSeconds(frag.start || 0),
            endText: formatSeconds((frag.start || 0) + frag.duration),
          })),
        );

        const maxDuration = Math.ceil(
          Math.max(...selected.map((frag) => frag.duration)),
        );

        let playlist = "#EXTM3U\n";
        playlist += "#EXT-X-VERSION:6\n";
        playlist += "#EXT-X-PLAYLIST-TYPE:VOD\n";
        playlist += `#EXT-X-TARGETDURATION:${maxDuration}\n`;
        playlist += "#EXT-X-MEDIA-SEQUENCE:0\n";

        const initSeg = details.initSegment || selected[0].initSegment;
        if (initSeg && initSeg.url) {
          playlist += `#EXT-X-MAP:URI="${initSeg.url}"\n`;
        }

        let lastKeyLine = "";
        selected.forEach((frag, i) => {
          const decrypt = frag.decryptdata;
          if (decrypt && decrypt.method && decrypt.method !== "NONE") {
            const ivText = decrypt.iv
              ? `,IV=0x${toHex(decrypt.iv)}`
              : "";
            const keyLine = `#EXT-X-KEY:METHOD=${decrypt.method},URI="${decrypt.uri}"${ivText}`;
            if (keyLine !== lastKeyLine) {
              playlist += `${keyLine}\n`;
              lastKeyLine = keyLine;
            }
          }

          if (i !== 0) {
            playlist += "#EXT-X-DISCONTINUITY\n";
          }

          if (
            Number.isFinite(frag.byteRangeStartOffset) &&
            Number.isFinite(frag.byteRangeEndOffset)
          ) {
            const length = frag.byteRangeEndOffset - frag.byteRangeStartOffset;
            playlist += `#EXT-X-BYTERANGE:${length}@${frag.byteRangeStartOffset}\n`;
          }

          playlist += `#EXTINF:${frag.duration.toFixed(3)},\n`;
          playlist += `${frag.url}\n`;
        });

        playlist += "#EXT-X-ENDLIST\n";
        console.log("Custom playlist:\n" + playlist);
        return playlist;
      }

      function toHex(bytesLike) {
        const bytes = Array.from(bytesLike);
        return bytes.map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      function formatSeconds(seconds) {
        const whole = Math.max(0, Math.floor(seconds));
        const h = String(Math.floor(whole / 3600)).padStart(2, "0");
        const m = String(Math.floor((whole % 3600) / 60)).padStart(2, "0");
        const s = String(whole % 60).padStart(2, "0");
        return `${h}:${m}:${s}`;
      }
    </script>
  </body>
</html>
